input {
file {
path => "/var/log/fastapi/app.log"
start_position => "beginning"
sincedb_path => "/dev/null"
}
}

filter {
json {
source => "message"
}

date {
match => ["timestamp", "ISO8601"]
target => "@timestamp"
}
}

output {
elasticsearch {
hosts => ["http://elasticsearch:9200"]
index => "fastapi-logs-%{+YYYY.MM.dd}"
}

stdout {
codec => rubydebug
}
}
