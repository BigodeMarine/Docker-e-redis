apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiassincrona-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apiassincrona
  template:
    metadata:
      labels:
        app: apiassincrona
    spec:
      containers:
      - name: apiassincrona-container
        image: apiassincrona-api:latest
        ports:
        - containerPort: 8000